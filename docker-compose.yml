version: "3.9"

services:
  job-hunter:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - PYTHONUTF8=1
    volumes:
      # Персистентные данные: SQLite, логи, Telegram-сессия
      - ./data:/app/data
      # Твой профиль — редактируй прямо здесь, без пересборки
      - ./config/profile:/app/config/profile
      # Конфиги (каналы, настройки)
      - ./config/settings.yaml:/app/config/settings.yaml
      - ./config/sources.yaml:/app/config/sources.yaml
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
