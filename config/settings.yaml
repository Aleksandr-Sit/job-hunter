# Основные настройки Job Hunter

matching:
  threshold: 58          # минимальный score для отправки в Telegram (было 65:
                         # открыт диапазон 55-64 частичных матчей, DIAGNOSE 08.07)
  batch_size: 5          # вакансий за один запрос к Cerebras (500 chars × 5 ≈ 3k токенов/батч)

scheduler:
  # interval_minutes: 60
  cron: "0 6,14 * * *"   # 10:00 и 18:00 по Самаре (UTC+4)

parsers:
  hh:
    enabled: true
    search_queries:
      - "Web3 специалист"
      - "Crypto operations"
      - "Web3 QA"
      - "DeFi operations"
      - "Blockchain operations"
      - "Web3 support"
      - "AI automation"
      - "Crypto community manager"
      - "Web3 менеджер"
      - "Digital asset operations"
      - "On-chain аналитик"
      - "Web3 аналитик"
      # CIS / Russian-speaking роли
      - "Менеджер СНГ"
      - "Комьюнити менеджер крипто"
      - "Русскоязычная поддержка"
      - "CIS operations"
      # Entry/junior — целевой сегмент (обучающие роли, низкий барьер)
      - "Стажёр крипто"
      - "Младший специалист поддержки"
      - "Оператор поддержки крипто"
      - "Junior crypto operations"
      - "Ассистент операционный"
      # AI automation (любая индустрия)
      - "AI automation specialist"
      - "Automation engineer"
      - "Автоматизация процессов"
      - "n8n разработчик"
      - "No-code разработчик"
      # РФ-крипто под волну регулирования (RU_CRYPTO_MARKET_MAP, 22.07)
      - "AML аналитик криптовалюта"
      - "ЦФА оператор"
      - "Цифровой рубль тестировщик"
      - "Оператор криптообменник"
      - "KYC специалист крипто"
      - "Комплаенс криптовалюта"
      # Отслеживаемые РФ-работодатели (карта рынка)
      - "BitOK"
      - "Bitbanker"
      - "ABCEX"
    area: 113            # 113 = Россия (все регионы)
    per_page: 50

  remoteok:
    enabled: true
    tags: []             # [] = все вакансии, или ["python", "backend"]

  cryptojoblist:
    enabled: true

  web3career:
    enabled: false      # 403 Forbidden на все запросы, включая RSS

  wellfound:
    enabled: false       # требует аккаунт, пока отключено

  laborx:
    enabled: true

  remote3:
    enabled: true

  contra:
    enabled: false       # фриланс-платформа, включи если нужно

  greenhouse:
    enabled: true
    companies:
      # Биржи
      - { slug: "okx",             name: "OKX" }           # ~250 вакансий
      - { slug: "bybit",           name: "Bybit" }         # ~129, много ops/AML (был ручным до 08.07)
      - { slug: "gemini",          name: "Gemini" }         # ~27 вакансий
      # Инфраструктура / кастодия
      - { slug: "fireblocks",      name: "Fireblocks" }     # ~58 вакансий
      - { slug: "ripple",          name: "Ripple" }         # ~159 вакансий
      - { slug: "consensys",       name: "Consensys" }      # ~10 вакансий
      - { slug: "coinbase",        name: "Coinbase" }       # ~100 вакансий
      # Добавлены (проверены через API)
      - { slug: "bitgo",           name: "BitGo" }          # ~46 вакансий
      - { slug: "bitpanda",        name: "Bitpanda" }       # ~47 вакансий
      # VC portfolio aggregators
      - { slug: "a16zcryptoteam",  name: "a16z Crypto Portfolio" }
      # Добавлены по данным (SOURCES_AUDIT §8, проба fetch'ем с VPS 08.07)
      - { slug: "blockchain",      name: "Blockchain.com" }  # ~35, много ops
      - { slug: "ondofinance",     name: "Ondo Finance" }    # RWA/DeFi
      - { slug: "layerzerolabs",   name: "LayerZero" }
      - { slug: "aptoslabs",       name: "Aptos" }
      - { slug: "b2c2",            name: "B2C2" }            # OTC, compliance
      - { slug: "figment",         name: "Figment" }        # staking-ops
      # Добавлены по данным (SOURCES_AUDIT §9, проба fetch'ем с VPS 13.07)
      - { slug: "luno",            name: "Luno" }            # AML/compliance/treasury ops
      - { slug: "nansen",          name: "Nansen" }          # compliance analyst, support (entry)

  ashby:
    enabled: true
    companies:
      # Биржи
      - { slug: "kraken.com",      name: "Kraken" }          # мигрировали с Lever
      # Инфраструктура / кошельки
      - { slug: "ledger",          name: "Ledger" }
      - { slug: "trust-wallet",    name: "Trust Wallet" }
      # Стейкинг / операции
      - { slug: "p2p.org",         name: "P2P.org" }
      # VC portfolio aggregators
      - { slug: "Paradigm",        name: "Paradigm Portfolio" }
      # Добавлены по данным (SOURCES_AUDIT §8, проба fetch'ем с VPS 08.07)
      - { slug: "Polymarket",      name: "Polymarket" }     # ~55, AML/compliance/ops
      - { slug: "stellar",         name: "Stellar" }
      - { slug: "alchemy",         name: "Alchemy" }
      - { slug: "turnkey",         name: "Turnkey" }
      # Добавлены по данным (SOURCES_AUDIT §9, проба fetch'ем с VPS 13.07)
      - { slug: "elliptic",        name: "Elliptic" }        # blockchain compliance, CSM
      - { slug: "notabene",        name: "Notabene" }        # travel-rule, customer success

  lever:
    enabled: true
    companies:
      # Биржи / крупные игроки
      - { slug: "binance",         name: "Binance" }        # ~361 вакансия
      # Инфраструктура / кастодия
      - { slug: "celestia",        name: "Celestia" }
      - { slug: "anchorage",       name: "Anchorage Digital" }  # ~49 вакансий
      # Fintech / payments
      - { slug: "moonpay",         name: "MoonPay" }        # ~14 вакансий
      # DeFi / протоколы
      - { slug: "safe",            name: "Safe" }           # ~16 вакансий
      - { slug: "gauntlet",        name: "Gauntlet" }       # ~6 вакансий
      - { slug: "1inch",           name: "1inch" }          # ~4 вакансии
      # Гейминг / NFT
      - { slug: "animocabrands",   name: "Animoca Brands" } # ~6 вакансий
      # Биржа (был ручным; часть ролей на кит. — режется гейтом языка)
      - { slug: "gate",            name: "Gate.io" }        # ~19, ops/KYC
      # Добавлены по данным (SOURCES_AUDIT §9, проба fetch'ем с VPS 13.07)
      - { slug: "merklescience",   name: "Merkle Science" } # blockchain intelligence, CSM

  linkedin:
    enabled: true
    hours_old: 72        # вакансии не старше 3 дней
    results_per_query: 30
    queries:
      - "crypto operations"
      - "web3 operations"
      - "DeFi operations"
      - "blockchain operations"
      - "digital asset operations"
      - "crypto community manager"
      - "web3 analyst"
      # Entry/junior — целевой сегмент
      - "junior crypto operations"
      - "operations associate crypto"
      - "crypto support junior"
      - "graduate program crypto"
      # CIS / Russian-speaking роли
      - "CIS community manager crypto"
      - "Russian speaking crypto operations"
      - "CIS growth manager web3"
      - "Russian community web3"
      # AI automation (любая индустрия)
      - "AI automation specialist"
      - "automation engineer"
      - "no-code developer"
      - "n8n developer"

  habr:
    enabled: true        # Habr Career — серверный HTML .vacancy-card, РФ-крипто/финтех
                         # (МТС Финтех, Bitbanker и др.); запросы задаются в парсере

  telegram:
    enabled: true        # читает t.me/s/<channel> публично, без API-ключей

logging:
  level: "INFO"
  file: "data/logs/job-hunter.log"
