# ── Веса ────────────────────────────────────────────────────────────────────
weights:
  gate_base: 10
  title_strong: 40
  title_weak: 20
  boost_each: 6
  boost_cap: 30
  penalize_each: -12
  penalize_cap: -36
  senior: -6
  remote: 10
  relocation: 8
  onsite: -18
  english_penalty_each: -14
  english_boost: 10
  entry: 8            # entry/junior/обучающие роли — низкий барьер, целевой сегмент

# ── Критерии по ролям ──────────────────────────────────────────────────────
roles:
  crypto_ops:
    threshold: 45   # калибровка по данным (docs/PREFILTER_AUDIT.md): 55 > базы
                    # «гейт 10 + сильный тайтл 40 = 50» — резало идеальные тайтлы
    english_weight: 1.0    # для ops английский менее критичен в ежедневной работе
    # RU-формы добавлены 21.07 (RU_CRYPTO_MARKET_MAP): гейты были только англ. →
    # чисто русскоязычные РФ-крипто-вакансии проваливались. Гейт = роль+домен,
    # поэтому не-крипто РФ-вакансии не пролезут. Морфология: кладём частые формы.
    must_role: ["operations", "ops", "operational",
                "операции", "операционный", "оператор", "операциями"]
    must_domain:
      - "crypto"
      - "blockchain"
      - "web3"
      - "defi"
      - "on-chain"
      - "onchain"
      - "digital asset"
      - "stablecoin"
      - "cex"
      - "dex"
      - "exchange"
      - "wallet"
      - "token"
      - "ledger"
      - "etherscan"
      # RU крипто-домен
      - "крипто"
      - "криптовалюта"
      - "криптовалюты"
      - "криптовалют"
      - "криптобиржа"
      - "криптобирже"
      - "блокчейн"
      - "цифровой рубль"
      - "цифрового рубля"
      - "цифровых активов"
      - "цифровые активы"
      - "цфа"
      - "обменник"
    titles_strong:
