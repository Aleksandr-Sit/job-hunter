# Критерии целевых ролей (Этап 3).
# Источник правды для смысла: docs/TARGET_CRITERIA.md
# Эталон логики (только справочник, НЕ модуль): docs/target_criteria_REFERENCE.py
# Логика, которая это использует: src/matcher/pre_filter.py (score_job/passes_pre_filter)
#
# Английский A1–A2 — реальный барьер кандидата. Поэтому требование сильного
# английского штрафует балл (сильнее для web3_support), а русскоязычные/CIS
# команды балл повышают.

# ── Глобальные стоп-слова: reject для ЛЮБОЙ роли ──────────────────────────────
global_hard_exclude:
  # неоплата
  - "unpaid"
  - "volunteer only"
  - "equity only"
  - "no salary"
  - "for free"
  # скам-сигналы
  - "recruitment fee"
  - "registration fee"
  - "processing fee"
  - "pay to apply"
  - "send funds"
  - "send crypto"
  - "upfront payment"
  - "training fee"
  # чисто разработческие роли (нужен код, которого пока нет)
  - "solidity developer"
  - "smart contract developer"
  - "smart contract engineer"
  - "rust developer"
  - "protocol engineer"
  - "blockchain developer"
  - "frontend developer"
  - "front-end developer"
  - "backend developer"
  - "back-end developer"
  - "full stack developer"
  - "full-stack developer"
  - "software engineer"
  - "staff engineer"
  - "devops engineer"

# ── Общие списки (одинаковы для обеих ролей) ──────────────────────────────────
english_penalty:
  - "native english"
  - "native-level english"
  - "fluent english"
  - "fluent in english"
  - "excellent english"
  - "perfect english"
  - "strong command of english"
  - "c1"
  - "c2"
  - "english c1"
  - "english c2"

# CIS / русскоязычная доработка — переиспользуется из существующей части
# pre_filter.py (та же логика, один источник списка терминов).
english_boost:
  - "russian"
  - "russian-speaking"
  - "русск"
  - "cis"
  - "снг"
  - "ru community"

# Entry/обучающие роли — низкий барьер входа = самый конверсионный сегмент для
# кандидата (6-8 мес подушки, готов на меньший старт в компании, которая обучает).
# Повышает балл роли, ГЕЙТ не трогает (гарантия ops/support уже в must_role).
entry_boost:
  - "junior"
  - "entry level"
  - "entry-level"
  - "graduate"
  - "trainee"
  - "no experience"
  - "no prior experience"
  - "will train"
  - "training provided"
  - "apprentice"
  - "младший"
  - "стажёр"
  - "стажер"
  - "без опыта"

remote_boost:
  - "remote"
  - "fully remote"
  - "work from anywhere"
  - "anywhere"
  - "worldwide"
  - "distributed team"
  - "work from home"

onsite_penalty:
  - "on-site"
  - "onsite"
  - "on site"
  - "in office"
  - "in-office"

relocation_ok:
  - "cyprus"
  - "limassol"
  - "greece"
  - "athens"
