      - "quality assurance"
      - "quality control"
      - "quality analyst"
      - "tester"
      - "testing"
      - "test engineer"
    must_domain:
      - "crypto"
      - "blockchain"
      - "web3"
      - "defi"
      - "dapp"
      - "on-chain"
      - "onchain"
      - "wallet"
