  # Третья роль — НЕ привязана к крипто/web3 (must_domain пуст): кандидат
  # позиционируется как AI-automation специалист в любой индустрии. Здесь
  # фильтр держится на titles/keywords, а не на отраслевом домене.
  # Кандидат — новичок (Claude Code с июня 2026), поэтому keywords_penalize
  # отсекает тяжёлые ML/research-роли не по его профилю, а не junior-позиции.
  ai_automation:
    threshold: 45
    english_weight: 1.2
    must_role: ["automation", "ai agent", "ai workflow", "no-code", "low-code", "rpa"]
    must_domain: []
    titles_strong:
