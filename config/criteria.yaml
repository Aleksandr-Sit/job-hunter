  # Четвёртая роль — Web3 QA (manual). Добавлена по CAREER_ADJACENCY_MAP (14.07):
  # смежность с практикой кандидата (ломал кошельки/tx), низкий порог, remote.
  # ФОКУС РУЧНОЙ QA: код-гейт pre_filter (selenium/cypress/pytest → «писать код»)
  # сам отсекает QA-automation/SDET, оставляя manual — это и есть профиль кандидата.
  qa_web3:
    threshold: 45
    english_weight: 1.2     # баг-репорты письменно; A2 на старте хватает
    must_role:
      # «quality» одиночным словом НЕ берём — цеплялось за risk/compliance-аналитиков
      # («ensure quality…»); держим точные QA-фразы (A/B 20.07, CAREER_ADJACENCY_MAP)
