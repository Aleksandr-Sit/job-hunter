      - "operations officer"
      - "operations executive"
      - "payment operations"
      - "payments operations"
      - "compliance operations"
      - "kyc operations"
      - "operations manager"
    keywords_boost:
      - "multichain"
      - "evm"
      - "ethereum"
      - "solana"
      - "arbitrum"
      - "staking"
      - "bridge"
      - "liquidity"
      - "settlement"
      - "reconciliation"
      - "custody"
      - "treasury"
      - "metamask"
      - "transaction monitoring"
      - "market maker"
      - "kyc"
      - "aml"
      - "kyt"
      - "под/фт"
      - "цифровой рубль"
      - "trading"
      - "async"
      - "on-chain"
      - "onchain"
    keywords_penalize:
      - "sales"
      - "account executive"
      - "business development"
      - "cold calling"
      - "phone support"
    # Лидерские термины — только по ЗАГОЛОВКУ: «you will lead», «reporting to
    # the Team Lead» в описании — не лидерская роль (docs/PREFILTER_AUDIT.md §5.2)
